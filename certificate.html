    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        #fluid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: auto;
        }

        .nav-pill {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 8px 12px;
            border-radius: 100px;
        }

        .nav-link {
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #999;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .category-header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 12px 30px;
            display: inline-block;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
        }

        .loop-container {
            overflow: hidden;
            width: 100%;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            padding: 20px 0;
        }

        .loop-track {
            display: flex;
            gap: 24px;
            width: max-content;
        }

        .scrolling {
            animation: scroll 40s linear infinite;
        }

        .static-track {
            justify-content: center;
            width: 100%;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ui-card {
            width: 300px;
            height: 200px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            flex-shrink: 0;
        }

        .ui-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .ui-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.3s;
        }

        #mobile-overlay {
            position: fixed;
            inset: 0;
            z-index: 90;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            clip-path: circle(0% at 100% 0%);
            transition: clip-path 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
        }

        #mobile-overlay.open {
            clip-path: circle(150% at 100% 0%);
            pointer-events: auto;
        }

        #cert-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #cert-modal.open { display: flex; }
        #modal-img {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(255,255,255,0.1);
        }
    </style>
</head>

        function initGallery() {
            const main = document.getElementById('main-content');
            
            Object.keys(certData).forEach(catName => {
                const items = certData[catName];
                const section = document.createElement('section');
                section.className = 'mb-24';
                
                const trackId = `track-${catName.replace(/\s+/g, '-').toLowerCase()}`;
                const isScrolling = items.length > 3;

                section.innerHTML = `
                    <div class="category-header">${catName}</div>
                    <div class="loop-container">
                        <div class="loop-track ${isScrolling ? 'scrolling' : 'static-track'}" id="${trackId}"></div>
                    </div>
                `;
                main.appendChild(section);

                const track = document.getElementById(trackId);
                const displayItems = isScrolling ? [...items, ...items] : items;

                displayItems.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'ui-card';
                    card.innerHTML = `<img src="${item.src}" onerror="this.src='https://via.placeholder.com/300x200?text=${catName}'">`;
                    card.onclick = () => openModal(item.src);
                    track.appendChild(card);
                });
            });
        }

        function toggleMenu() {
            const overlay = document.getElementById('mobile-overlay');
            const icon = document.getElementById('menu-icon');
            overlay.classList.toggle('open');
            icon.setAttribute('data-lucide', overlay.classList.contains('open') ? 'x' : 'menu');
            lucide.createIcons();
        }

        function openModal(src) {
            const modalImg = document.getElementById('modal-img');
            modalImg.src = src;
            document.getElementById('cert-modal').classList.add('open');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('cert-modal').classList.remove('open');
            document.body.style.overflow = 'auto';
        }

        async function downloadAsPDF() {
            const imgElement = document.getElementById('modal-img');
            const btn = document.getElementById('download-pdf-btn');
            const originalHTML = btn.innerHTML;
            btn.innerText = "GENERATING...";
            
            if (!imgElement.complete || imgElement.naturalWidth === 0) {
                alert("Image not loaded yet.");
                btn.innerHTML = originalHTML;
                lucide.createIcons();
                return;
            }

            try {
                const fileName = imgElement.src.split('/').pop().split('.')[0];
                const response = await fetch(imgElement.src);
                const blob = await response.blob();
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function() {
                    const base64data = reader.result;
                    const { jsPDF } = window.jspdf;
                    const orientation = imgElement.naturalWidth > imgElement.naturalHeight ? 'l' : 'p';
                    const pdf = new jsPDF({
                        orientation: orientation,
                        unit: 'px',
                        format: [imgElement.naturalWidth, imgElement.naturalHeight]
                    });
                    pdf.addImage(base64data, 'JPEG', 0, 0, imgElement.naturalWidth, imgElement.naturalHeight);
                    pdf.save(fileName + ".pdf");
                    btn.innerHTML = originalHTML;
                    lucide.createIcons();
                };
            } catch (error) {
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        }

        (function() {
            const canvas = document.getElementById('fluid-canvas');
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();
        })();

        window.onload = () => {
            initGallery();
            lucide.createIcons();
        };
    </script>
